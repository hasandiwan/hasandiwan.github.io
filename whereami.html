<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
  <head>
    <title>Where are you?</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
	  crossorigin=""/>
        <link href="//cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <style>
      #map { height: 93vh; width: 100vw;}
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="distanceBlock" class="text-body-secondary">You are <span class="fw-bold" id="distance"></span> from the clicked marker, which was my real location <span class="fw-bold" id="time"></span>.</div>
    <script src="//code.jquery.com/jquery-4.0.0.min.js" integrity="sha512-8LENNbXmzI/Gbj+OwXmqR6V4QaUAw0/porPzy1+dQoJqC0JPHedWoe0DDOTL2uHA5XXJyIsPtiMHH86pVlay6A==" crossorigin="anonymous"></script>
    <script src="//cdn.jsdelivr.net/npm/luxon@3.7.2/build/global/luxon.min.js" integrity="sha256-UWxf6lyCvfH7XEcrmq/cqc2m3IBrLBLOnWLC4Pw0gQQ=" crossorigin="anonymous"></script>
    <script src="//unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="//cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
  <script>
    $(document).ready(function() {
	$('#distanceBlock').hide()
	markers = L.featureGroup()
	markers.groupName = 'my location history'
	latitude_sum = 0
	longitude_sum = 0
	icon = L.icon({iconUrl: '//units.d8u.us/pic', iconSize: [38, 38], iconAnchor: [22, 94], popupAnchor: [-3, -76]})
	you = ''
	map = L.map('map').setView([0,0],1).on('locationfound', function(e) { you = L.marker(e.latlng) })
	map.locate({setView: true})
	$.getJSON('//units.d8u.us/loc').done(function(response) {
	    $.each(response.results, function(index, r) {
		L.marker([r.latitude, r.longitude], {title: "I was here at "+r.loggedOn, alt: "I was here at "+r.loggedOn, opacity: (index == 0? 1 : 0.5), icon: icon}).addTo(markers).on('click', function() { $('#time').text(luxon.DateTime.fromISO(r.loggedOn).toRelative()); $('#distance').text(you._latlng.distanceTo([r.latitude, r.longitude]).toFixed(2) + " meters").parent().show(); }).addTo(markers)
	    })
	    // FIXME Not working
	    map.fitBounds([[markers.getBounds()._southWest.lat, markers.getBounds()._southWest.lng], [markers.getBounds()._northEast.lat, markers.getBounds()._northEast.lng]])
	    markers.addTo(map)
	})
	L.tileLayer('//tile.openstreetmap.org/{z}/{x}/{y}.png', {
	    maxZoom: 19,
	    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);
    })
    </script>
  </body>
  </html>
